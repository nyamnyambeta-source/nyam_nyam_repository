<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
      {% include "core/styles/styles.css" %}
    </style>
    <title>NYAM NYAM</title>
  </head>
  <body>
    <header class="app-shell">
      <div class="app-shell__bar">
        <div class="app-shell__brand">
          <span class="app-shell__kicker">Nyam Nyam</span>
          <span class="app-shell__title">TPV</span>
        </div>

        <nav class="app-nav">
          <a href="{% url 'admin:index' %}" class="app-nav__link app-nav__link--admin">
            ADMIN
          </a>

          <button
            class="app-nav__link"
            hx-get="{% url 'core:config' %}"
            hx-target="#main-content"
            hx-swap="innerHTML"
          >
            Config
          </button>

          <button
            class="app-nav__link"
            hx-get="{% url 'core:kitchen_screen' %}"
            hx-target="#main-content"
            hx-swap="innerHTML"
          >
            Panel cocina
          </button>

          <button
            class="app-nav__link app-nav__link--primary"
            hx-get="{% url 'core:map' %}"
            hx-target="#main-content"
            hx-swap="innerHTML"
          >
            Mesas
          </button>
        </nav>
      </div>
    </header>

    <div id="main-content">
      {% if content_template %}
        {% include content_template %}
      {% else %}
        {% block content %}{% endblock %}
      {% endif %}
    </div>
  </body>
</html>
