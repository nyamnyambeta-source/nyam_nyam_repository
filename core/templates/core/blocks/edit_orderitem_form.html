<div class="product-config-box">
    <h3 style="margin-top: 0;">Editar {{ order_item.product.name }}</h3>

    <form
        hx-post="{% url 'core:edit_orderitem' order.id order_item.id %}"
        hx-target="#order-panel"
        hx-swap="innerHTML"
        hx-on::after-request="if(event.detail.successful) document.getElementById('modal-panel').innerHTML='';"
    >
        {% csrf_token %}

        <p>Modifica los extras y las observaciones del producto.</p>

        <div class="extras-grid">
            {% for allowed_extra in allowed_extras %}
                <label class="extra-card">
                    <div class="extra-card__header">
                        <div class="extra-card__copy">
                            <div class="extra-card__name">{{ allowed_extra.extra.name }}</div>

                            {% if allowed_extra.extra.price %}
                                <div class="extra-card__price">+ {{ allowed_extra.extra.price }} EUR</div>
                            {% endif %}
                        </div>

                        <input
                            type="checkbox"
                            name="extras"
                            value="{{ allowed_extra.id }}"
                            {% if allowed_extra.is_selected %}checked{% endif %}
                        >
                    </div>

                    <input
                        class="extra-card__quantity"
                        type="number"
                        name="quantity_{{ allowed_extra.id }}"
                        value="{{ allowed_extra.selected_quantity }}"
                        min="1"
                        max="{{ allowed_extra.max_quantity }}"
                    >
                </label>
            {% empty %}
                <p>Este producto no tiene extras configurados.</p>
            {% endfor %}
        </div>

        <div class="observations-grid">
            <textarea name="observations" id="observations-area">{{ order_item.observations|default_if_none:"" }}</textarea>
        </div>

        <div class="product-config-actions">
            <button type="submit" class="btn btn-primary">Guardar cambios</button>
            <button
                type="button"
                class="btn btn-secondary"
                onclick="document.getElementById('modal-panel').innerHTML='';"
            >
                Cancelar
            </button>
        </div>
    </form>
</div>
